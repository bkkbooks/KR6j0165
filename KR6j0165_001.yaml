body:
  text: 南天竺三藏金剛智奉詔譯爾時世尊為末世一切衆生故現五種光明從頂上放火光照三界所有惡魔鬼神等不信佛教者同時悉焚燒金剛手菩薩見是相已白世尊言如來智火被燒所有天魔鬼神於衆生生害者悉恐怖不得安樂欲説何法唯願如來演説爾時大毗盧遮那佛告金剛手菩薩言有明王名大勝佛頂心呪誦一遍所求滿足十方諸佛中最勝明王若有金剛子誦滿五萬遍一切諸佛大菩薩天龍天女衆晝夜共守護令成所願爾時如來説明曰唵麼賀縛日羅二合瑟抳二合灑吽引怛路二合瀨利二合惡入吽引二手內縛忍願屈如頂是名根本大印若有末法轉時有諸衆生常結此印持念真言者一切兵力不能相害水火不焚漂不便一切惡魔惡鬼金剛胎藏聖衆坐臥咸來增擁護復次説畫像法於黑月房宿取清淨絹素畫大勝明王戴五佛冠出現十二臂住智拳印執五股青蓮花寶珠羯磨鉤索鎖鈴利劍輪等印安住千葉白蓮華身色如白光遍身成火光四角畫四明王東南角畫不動金剛西南角馬頭金剛西北角六足金剛東北角藥叉金剛畫此四忿怒王各執器杖現極猛利勢次畫八方天王各卛眷屬恭敬圍繞若有真言行者欲供養者於淨室及山林靜靜處燒香散時花念誦真言五十萬遍我及八佛頂無量天菩薩金剛天等現身常隨意奉仕若有衆生每日誦持此真言於現在生之中勝一切天人當未世中身如遍照尊持此印真言者能成就十億種所願復若有行者作種種降魔及一切阿尾捨法者我作十千金剛童子則隨意持誦者常住若悲心莫他相憎觀吽字心上行住坐臥住本尊三摩地成就一切願有情見者悉歡喜愛念此人如遍照尊無量諸佛常來覆護不捨真言行者不起貪瞋癡等煩惱深歸命三寶以善根回向六道者必速證無上菩提行者諸穢處用烏瑟摳摩金剛呪印加持五處以右手四指作拳直竪彈指密言曰唵俱路二合馱曩吽弱一校了康元二年二月二十九日於覺洞院書寫之了金剛佛子親尊二十二
